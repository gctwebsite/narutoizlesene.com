<div class="neon-box video-platform-box" style="background-color: #111827; border-radius: 16px; padding: 24px; border: 2px solid #1f2937; box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); margin-bottom: 25px; color: #f3f4f6;">
    <h2 style="color: #ff007f; margin-bottom: 15px; text-shadow: 0 0 10px #ff007f; font-family: sans-serif;">
        🦊 Naruto: Spacetoon Arşivi (YouTube Player)
    </h2>
    
    <div class="main-video-wrapper" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 2px solid #00f0ff;">
        <iframe 
            id="naruto-player"
            src="https://www.youtube.com/embed/WxUF051haRY" 
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <h3 style="margin: 20px 0 10px 0; font-size: 16px; color: #9ca3af; font-family: sans-serif;">Bölüm Seçiniz:</h3>
    <div class="episode-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;">
        
        <button class="episode-btn" 
                data-youtube="https://www.youtube.com/embed/WxUF051haRY" 
                onclick="changeEpisode(this)" 
                style="padding: 10px; font-size: 13px; text-align: center; background: transparent; color: #39ff14; border: 2px solid #39ff14; border-radius: 10px; cursor: pointer; font-weight: bold;">
            🎵 Açılış Müziği
        </button>
        
        <button class="episode-btn" 
                data-youtube="https://www.youtube.com/embed/Wv2AlorelbU" 
                onclick="changeEpisode(this)" 
                style="padding: 10px; font-size: 13px; text-align: center; background: transparent; color: #39ff14; border: 2px solid #39ff14; border-radius: 10px; cursor: pointer; font-weight: bold;">
            🍃 1. Bölüm (Full)
        </button>
        
        <button class="episode-btn" 
                data-youtube="https://www.youtube.com/embed/Jdqkfa35MsI" 
                onclick="changeEpisode(this)" 
                style="padding: 10px; font-size: 13px; text-align: center; background: transparent; color: #39ff14; border: 2px solid #39ff14; border-radius: 10px; cursor: pointer; font-weight: bold;">
            👁️ 92. Bölüm (Full)
        </button>

        <button class="episode-btn" 
                data-youtube="https://www.youtube.com/embed/WsuWfEzPk4g" 
                onclick="changeEpisode(this)" 
                style="padding: 10px; font-size: 13px; text-align: center; background: transparent; color: #39ff14; border: 2px solid #39ff14; border-radius: 10px; cursor: pointer; font-weight: bold;">
            🎬 Özel Film (Full)
        </button>
    </div>
</div>

<script>
function changeEpisode(button) {
    // Butondan YouTube linkini çek
    const youtubeLink = button.getAttribute("data-youtube");
    // iframe oynatıcısının src'sini değiştirerek sadece YouTube'dan açmasını sağla
    document.getElementById("naruto-player").src = youtubeLink;
    
    // Aktif butona neon mavi renk ver, diğerlerini yeşil yap
    document.querySelectorAll(".episode-btn").forEach(btn => {
        btn.style.borderColor = "#39ff14";
        btn.style.color = "#39ff14";
    });
    button.style.borderColor = "#00f0ff";
    button.style.color = "#00f0ff";
}
</script>
