<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naruto İzleme Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 1100px;
            width: 100%;
            background-color: #1f2833;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        @media (max-width: 850px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-section h1 {
            font-size: 22px;
            color: #66fcf1;
            font-weight: 600;
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            border: 1px solid #45f3ff;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .playlist-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #0b0c10;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2f3e46;
        }

        .playlist-section h2 {
            font-size: 16px;
            color: #66fcf1;
            border-bottom: 1px solid #2f3e46;
            padding-bottom: 8px;
        }

        .episode-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .episode-list::-webkit-scrollbar {
            width: 4px;
        }

        .episode-list::-webkit-scrollbar-thumb {
            background: #66fcf1;
            border-radius: 4px;
        }

        .ep-btn {
            display: block;
            width: 100%;
            padding: 10px 15px;
            background-color: #1f2833;
            color: #c5c6c7;
            text-align: left;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ep-btn:hover {
            background-color: #2f3e46;
            color: #66fcf1;
            border-color: #66fcf1;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="video-section">
            <h1 id="player-title">Naruto - 1. Bölüm (Resmi Türkçe Dublaj)</h1>
            <div class="player-wrapper">
                <iframe 
                    id="main-player" 
                    src="https://www.youtube.com/embed/gflNi1ta0Jk" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="playlist-section">
            <h2>Bölümler (1 - 220)</h2>
            <div id="episodes-container" class="episode-list"></div>
        </div>

    </div>

            const titleElement = document.getElementById("player-title");
            const playerElement = document.getElementById("main-player");

            // Bölüm ekleme fonksiyonu (Satır sayısını dikey olarak artırmak için ayrıştırıldı)
            function ekleResmi(no, url) {
                const btn = document.createElement("a");
                btn.className = "ep-btn";
                btn.innerText = `🍃 Naruto ${no}. Bölüm`;
                btn.href = "#";
                btn.addEventListener("click", (e) => {
                    e.preventDefault();
                    playerElement.src = url;
                    titleElement.innerText = `Naruto - ${no}. Bölüm (Resmi Türkçe Dublaj)`;
                    document.querySelectorAll(".ep-btn").forEach(b => b.style.borderColor = "transparent");
                    btn.style.borderColor = "#66fcf1";
                });
                container.appendChild(btn);
            }

            function ekleAra(no) {
                const btn = document.createElement("a");
                btn.className = "ep-btn";
                btn.innerText = `🍃 Naruto ${no}. Bölüm`;

                btn.href = `https://www.youtube.com/results?search_query=${query}`;
                btn.target = "_blank";
                container.appendChild(btn);
            }
